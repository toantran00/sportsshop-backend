<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Sports Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center" id="loginForm">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center mb-4">🔑 Đăng Nhập Hệ Thống</h3>
                    <input type="text" id="username" class="form-control mb-3" placeholder="Tên đăng nhập (toan)">
                    <input type="password" id="password" class="form-control mb-3" placeholder="Mật khẩu (123)">
                    <button class="btn btn-dark w-100" onclick="login()">Vào Cửa Hàng</button>
                    <div id="loginMsg" class="text-danger mt-2 text-center"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="mainDashboard" style="display: none;">
        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
            <h2 class="text-success">🛒 Siêu Thị Cầu Lông</h2>
            <div>
                <span class="badge bg-secondary me-3 fs-6">Xin chào, Toàn!</span>
                <button class="btn btn-outline-primary me-2" onclick="showPanel('shopPanel')">🛍️ Mua Sắm</button>
                <button class="btn btn-outline-info" onclick="showHistory()">📦 Lịch Sử Đơn Hàng</button>
            </div>
        </div>

        <div id="shopPanel">
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="searchKeyword" class="form-control" placeholder="Tìm vợt, giày, phụ kiện...">
                        <button class="btn btn-primary" onclick="loadProducts(0)">Tìm Kiếm</button>
                    </div>
                </div>
            </div>
            <div id="orderMsg" class="alert" style="display: none;"></div>
            <div class="row" id="productList"></div>
            <div class="d-flex justify-content-center mt-4" id="pagination"></div>
        </div>

        <div id="historyPanel" style="display: none;">
            <h4 class="mb-3 text-info">Danh sách đơn hàng của bạn</h4>
            <div class="table-responsive">
                <table class="table table-hover table-bordered bg-white shadow-sm">
                    <thead class="table-dark">
                    <tr>
                        <th>Mã Đơn</th>
                        <th>Tên Sản Phẩm</th>
                        <th>Số Lượng</th>
                        <th>Tổng Tiền</th>
                        <th>Ngày Mua</th>
                        <th>Trạng Thái</th>
                    </tr>
                    </thead>
                    <tbody id="historyList">
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    let myToken = "";

    function login() {
        let u = document.getElementById("username").value;
        let p = document.getElementById("password").value;

        fetch('http://localhost:8080/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        })
            .then(res => res.text())
            .then(token => {
                if (token.includes("Sai tài khoản")) {
                    document.getElementById("loginMsg").innerText = "❌ Sai rồi fen ơi!";
                } else {
                    myToken = token;
                    document.getElementById("loginForm").style.display = "none";
                    document.getElementById("mainDashboard").style.display = "block";
                    showPanel('shopPanel');
                    loadProducts(0);
                }
            });
    }

    // Chuyển đổi qua lại giữa Mua sắm và Lịch sử
    function showPanel(panelId) {
        document.getElementById('shopPanel').style.display = 'none';
        document.getElementById('historyPanel').style.display = 'none';
        document.getElementById(panelId).style.display = 'block';
    }

    // Các hàm của Màn hình Shop (Giữ nguyên như cũ)
    function loadProducts(page) {
        let keyword = document.getElementById("searchKeyword").value;
        fetch(`http://localhost:8080/api/products?page=${page}&size=6&keyword=${keyword}`)
            .then(res => res.json())
            .then(data => {
                let html = "";
                data.content.forEach(p => {
                    html += `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 shadow-sm border-0">
                            <div class="card-body text-center">
                                <h5 class="card-title text-primary">${p.name}</h5>
                                <h4 class="text-danger fw-bold my-3">${p.price.toLocaleString('vi-VN')} đ</h4>
                                <p class="text-muted small">Kho còn: ${p.quantity}</p>
                                <button class="btn btn-outline-success w-100" onclick="orderNow(${p.id})">Mua Ngay (1 cái)</button>
                            </div>
                        </div>
                    </div>`;
                });
                document.getElementById("productList").innerHTML = html;

                let paginationHtml = "";
                for(let i=0; i < data.totalPages; i++) {
                    paginationHtml += `<button class="btn btn-sm ${i===page?'btn-primary':'btn-outline-primary'} me-1" onclick="loadProducts(${i})">${i+1}</button>`;
                }
                document.getElementById("pagination").innerHTML = paginationHtml;
            });
    }

    function orderNow(productId) {
        fetch('http://localhost:8080/api/orders/checkout', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + myToken
            },
            body: JSON.stringify({ productId: productId, quantity: 1 })
        })
            .then(res => res.text())
            .then(msg => {
                let msgBox = document.getElementById("orderMsg");
                msgBox.style.display = "block";
                if (msg.includes("Xin lỗi") || msg.includes("tính hack")) {
                    msgBox.className = "alert alert-danger";
                } else {
                    msgBox.className = "alert alert-success";
                    loadProducts(0);
                }
                msgBox.innerText = msg;
                setTimeout(() => { msgBox.style.display = "none"; }, 3000);
            });
    }

    // ==========================================
    // HÀM MỚI: TẢI LỊCH SỬ MUA HÀNG
    // ==========================================
    function showHistory() {
        showPanel('historyPanel'); // Đổi màn hình

        fetch('http://localhost:8080/api/orders/my-history', {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + myToken // Trình thẻ lấy lịch sử của Toàn
            }
        })
            .then(res => res.json())
            .then(orders => {
                let html = "";
                if(orders.length === 0) {
                    html = "<tr><td colspan='6' class='text-center text-muted'>Bạn chưa mua món đồ nào!</td></tr>";
                } else {
                    orders.forEach(o => {
                        // Cắt gọt cái ngày giờ cho nó đẹp (VD: 2026-04-18T23:07:25 -> 23:07 18/04/2026)
                        let dateObj = new Date(o.orderDate);
                        let formattedDate = dateObj.toLocaleString('vi-VN');

                        html += `
                        <tr>
                            <td class="fw-bold">#${o.id}</td>
                            <td>${o.productName}</td>
                            <td class="text-center">${o.quantityBought}</td>
                            <td class="text-danger fw-bold">${o.totalPrice.toLocaleString('vi-VN')} đ</td>
                            <td>${formattedDate}</td>
                            <td><span class="badge bg-success">${o.status}</span></td>
                        </tr>`;
                    });
                }
                document.getElementById("historyList").innerHTML = html;
            });
    }
</script>

</body>
</html>
