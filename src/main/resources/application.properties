# 1. Cổng chạy server (đổi sang 8080 nếu thích)
server.port=8080

# 2. Cấu hình cắm ống hút xuống SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SportsShopDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 3. Phép thuật của JPA (Tự động tạo bảng dựa trên code Java)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true